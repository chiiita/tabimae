<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>たびまえ — 旅のまえに、知っておく</title>
<style>
  /* ===== Notion design tokens ===== */
  :root{
    --text:#37352F;               /* Notion default text */
    --text-soft:rgba(55,53,47,0.65);
    --text-faint:rgba(55,53,47,0.45);
    --bg:#ffffff;
    --bg-hover:rgba(55,53,47,0.04);
    --bg-gray:#F1F1EF;            /* gray callout/block */
    --bg-red:#FDEBEC;            /* red callout */
    --text-red:#B0413E;
    --bg-yellow:#FBF3DB;
    --bg-blue:#E7F3F8;
    --bg-green:#EDF3EC;
    --border:rgba(55,53,47,0.09); /* hairline divider */
    --border-strong:rgba(55,53,47,0.16);
    --radius:6px;
    --radius-sm:4px;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,"Helvetica Neue","Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic UI",Meiryo,sans-serif;
    --maxw:720px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--font);
    color:var(--text);
    background:var(--bg);
    font-size:16px;
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  a{color:inherit;text-decoration:none;}
  ::selection{background:rgba(45,170,219,0.25);}

  /* ===== layout shell ===== */
  .topbar{
    position:sticky;top:0;z-index:30;
    background:rgba(255,255,255,0.85);
    backdrop-filter:saturate(180%) blur(8px);
    border-bottom:1px solid var(--border);
  }
  .topbar-inner{
    max-width:var(--maxw);margin:0 auto;
    padding:10px 24px;
    display:flex;align-items:center;gap:8px;
    min-height:44px;
    font-size:14px;color:var(--text-soft);
  }
  .crumb{
    display:flex;align-items:center;gap:6px;
    overflow:hidden;white-space:nowrap;
  }
  .crumb a, .crumb span{
    padding:3px 6px;border-radius:var(--radius-sm);
    display:inline-flex;align-items:center;gap:5px;
    max-width:60vw;overflow:hidden;text-overflow:ellipsis;
  }
  .crumb a:hover{background:var(--bg-hover);}
  .crumb .sep{opacity:0.4;padding:0;}
  .crumb .here{color:var(--text);font-weight:500;}

  main{max-width:var(--maxw);margin:0 auto;padding:0 24px 96px;}

  /* ===== page heading (Notion icon+title) ===== */
  .page-head{padding:48px 0 8px;}
  .page-icon{font-size:64px;line-height:1.1;margin-bottom:14px;}
  h1.page-title{
    font-size:40px;font-weight:700;line-height:1.2;
    margin:0;letter-spacing:-0.01em;
  }
  .page-sub{
    color:var(--text-soft);font-size:15.5px;
    margin:10px 0 0;max-width:54ch;
  }

  /* ===== home: country list ===== */
  .section-label{
    font-size:12px;font-weight:600;letter-spacing:0.04em;
    color:var(--text-faint);text-transform:uppercase;
    margin:40px 0 6px;
  }
  .country-list{
    border-top:1px solid var(--border);
    margin-top:8px;
  }
  .country-row{
    display:flex;align-items:center;gap:14px;
    padding:14px 8px;
    border-bottom:1px solid var(--border);
    border-radius:var(--radius-sm);
    cursor:pointer;
    transition:background .12s ease;
    min-height:44px;
  }
  .country-row:hover{background:var(--bg-hover);}
  .country-flag{font-size:30px;line-height:1;flex:none;width:40px;text-align:center;}
  .country-main{flex:1;min-width:0;}
  .country-name{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .country-en{color:var(--text-faint);font-weight:400;font-size:13px;}
  .country-tag{color:var(--text-soft);font-size:13.5px;line-height:1.5;margin-top:2px;
    overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;}
  .country-arrow{color:var(--text-faint);font-size:15px;flex:none;}

  /* safety badge */
  .badge{
    display:inline-flex;align-items:center;gap:5px;
    font-size:11.5px;font-weight:600;
    padding:2px 8px;border-radius:3px;
    border:1px solid transparent;white-space:nowrap;
  }
  .badge .dot{width:7px;height:7px;border-radius:50%;}
  .sf1{background:var(--bg-green);color:#3a6b46;}
  .sf1 .dot{background:#4f9d69;}
  .sf2{background:var(--bg-yellow);color:#8a6d1f;}
  .sf2 .dot{background:#d4a72c;}
  .sf3{background:#FBE8D9;color:#9a5b22;}
  .sf3 .dot{background:#d9730d;}
  .sf4{background:var(--bg-red);color:var(--text-red);}
  .sf4 .dot{background:#c0413e;}

  /* ===== country page: property summary (simple table) ===== */
  .prop-table{
    margin-top:24px;
    border:1px solid var(--border);
    border-radius:var(--radius);
    overflow:hidden;
  }
  .prop-row{
    display:flex;
    border-bottom:1px solid var(--border);
    font-size:14.5px;
  }
  .prop-row:last-child{border-bottom:none;}
  .prop-key{
    flex:none;width:128px;
    padding:11px 14px;
    color:var(--text-soft);
    background:rgba(55,53,47,0.025);
    display:flex;align-items:center;gap:7px;
    border-right:1px solid var(--border);
    font-size:13.5px;
  }
  .prop-val{padding:11px 14px;flex:1;min-width:0;font-weight:500;display:flex;align-items:center;}

  /* ===== table of contents (left, jump links) ===== */
  .toc{
    margin:32px 0 8px;
    padding:14px 16px;
    background:var(--bg-gray);
    border-radius:var(--radius);
  }
  .toc-title{font-size:12px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}
  .toc-link{
    display:flex;align-items:center;gap:8px;
    padding:5px 6px;border-radius:var(--radius-sm);
    font-size:14.5px;color:var(--text-soft);cursor:pointer;min-height:32px;
  }
  .toc-link:hover{background:rgba(55,53,47,0.05);color:var(--text);}

  /* ===== section headings (Notion heading block) ===== */
  .sec{padding-top:14px;scroll-margin-top:64px;}
  h2.sec-h{
    font-size:24px;font-weight:700;letter-spacing:-0.005em;
    margin:40px 0 6px;padding-bottom:0;
    display:flex;align-items:center;gap:10px;line-height:1.3;
  }
  h3.sub-h{
    font-size:16.5px;font-weight:600;margin:24px 0 8px;
    display:flex;align-items:center;gap:8px;
  }
  .sec-divider{height:1px;background:var(--border);margin:6px 0 0;border:none;}

  /* basics list */
  .basic-item{
    padding:14px 0;border-bottom:1px solid var(--border);
  }
  .basic-item:last-child{border-bottom:none;}
  .basic-top{display:flex;gap:12px;align-items:baseline;flex-wrap:wrap;}
  .basic-label{font-size:13px;color:var(--text-faint);font-weight:600;flex:none;width:104px;}
  .basic-value{font-weight:600;font-size:15px;flex:1;min-width:140px;}
  .basic-note{color:var(--text-soft);font-size:14px;margin:6px 0 0 0;line-height:1.6;}

  /* safety callout (gray) */
  .callout{
    display:flex;gap:12px;
    background:var(--bg-gray);
    border-radius:var(--radius);
    padding:14px 16px;
    margin:12px 0;
    align-items:flex-start;
  }
  .callout-ico{font-size:20px;line-height:1.5;flex:none;}
  .callout-body{flex:1;min-width:0;}
  .callout-cat{font-weight:600;font-size:15px;margin-bottom:4px;}
  .callout ul{margin:6px 0 0;padding-left:18px;}
  .callout li{font-size:14.5px;color:var(--text);line-height:1.65;margin:3px 0;}

  /* phrases (database rows) */
  .phrase-group{margin:10px 0 22px;}
  .phrase-rows{border-top:1px solid var(--border);}
  .phrase-row{
    display:flex;align-items:center;gap:12px;
    padding:12px 8px;
    border-bottom:1px solid var(--border);
    border-radius:var(--radius-sm);
    cursor:pointer;transition:background .12s ease;min-height:44px;
  }
  .phrase-row:hover{background:var(--bg-hover);}
  .phrase-main{flex:1;min-width:0;}
  .phrase-ja{font-size:12.5px;color:var(--text-faint);}
  .phrase-local{font-size:19px;font-weight:600;line-height:1.4;margin:2px 0;word-break:break-word;}
  .phrase-roman{font-size:13px;color:var(--text-soft);}
  .phrase-copy{
    flex:none;font-size:12px;color:var(--text-faint);
    border:1px solid var(--border-strong);border-radius:var(--radius-sm);
    padding:5px 9px;white-space:nowrap;
    display:flex;align-items:center;gap:4px;
  }
  .phrase-row:hover .phrase-copy{color:var(--text-soft);}

  /* emergency (red callout) */
  .emerg{
    background:var(--bg-red);
    border-radius:var(--radius);
    padding:6px 16px 8px;
    margin:12px 0;
  }
  .emerg-item{
    display:flex;align-items:center;gap:12px;
    padding:12px 0;
    border-bottom:1px solid rgba(176,65,62,0.14);
  }
  .emerg-item:last-child{border-bottom:none;}
  .emerg-ico{font-size:18px;flex:none;}
  .emerg-body{flex:1;min-width:0;}
  .emerg-label{font-size:13px;color:var(--text-red);font-weight:600;}
  .emerg-note{font-size:13px;color:rgba(55,53,47,0.6);margin-top:2px;line-height:1.5;}
  .emerg-val{font-weight:600;font-size:15px;}
  a.emerg-tel{
    flex:none;background:#fff;border:1px solid rgba(176,65,62,0.3);
    color:var(--text-red);border-radius:var(--radius-sm);
    padding:7px 12px;font-size:14px;font-weight:600;white-space:nowrap;
    display:flex;align-items:center;gap:5px;min-height:36px;align-self:center;
  }
  a.emerg-tel:hover{background:#fff6f6;}
  .emerg-textval{color:var(--text);font-weight:500;font-size:14px;}

  /* apps */
  .app-item{
    padding:12px 0;border-bottom:1px solid var(--border);
    display:flex;gap:12px;align-items:flex-start;
  }
  .app-item:last-child{border-bottom:none;}
  .app-ico{font-size:18px;flex:none;}
  .app-body{flex:1;min-width:0;}
  .app-name{font-weight:600;font-size:15px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .app-cat{font-size:11.5px;color:var(--text-soft);background:var(--bg-gray);padding:1px 7px;border-radius:3px;font-weight:500;}
  .app-desc{color:var(--text-soft);font-size:14px;margin-top:3px;line-height:1.55;}

  /* note CTA (callout/button block) */
  .note-cta{
    margin:48px 0 0;
    background:var(--bg-blue);
    border-radius:var(--radius);
    padding:18px 18px 20px;
    display:flex;gap:14px;align-items:flex-start;
  }
  .note-cta-ico{font-size:22px;flex:none;}
  .note-cta-body{flex:1;}
  .note-cta-title{font-weight:600;font-size:16px;}
  .note-cta-desc{color:var(--text-soft);font-size:14px;margin:5px 0 12px;line-height:1.6;}
  .note-btn{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--text);color:#fff;
    border-radius:var(--radius-sm);
    padding:9px 16px;font-size:14px;font-weight:600;min-height:40px;
  }
  .note-btn:hover{background:#000;}
  .note-btn.disabled{
    background:rgba(55,53,47,0.08);color:var(--text-faint);cursor:default;
    border:1px solid var(--border);
  }

  .footer{
    margin-top:64px;padding-top:20px;border-top:1px solid var(--border);
    color:var(--text-faint);font-size:13px;line-height:1.7;
  }
  .footer a{color:var(--text-soft);}

  /* toast */
  #toast{
    position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
    background:var(--text);color:#fff;
    font-size:14px;font-weight:500;
    padding:10px 18px;border-radius:var(--radius);
    box-shadow:0 4px 12px rgba(15,15,15,0.15);
    opacity:0;pointer-events:none;transition:opacity .2s ease, transform .2s ease;
    z-index:60;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (max-width:600px){
    body{font-size:15px;}
    main{padding:0 18px 80px;}
    .topbar-inner{padding:8px 18px;}
    .page-icon{font-size:54px;}
    h1.page-title{font-size:32px;}
    h2.sec-h{font-size:21px;}
    .prop-key{width:96px;}
    .basic-label{width:88px;}
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <nav class="crumb" id="crumb"></nav>
    </div>
  </div>

  <main id="app"></main>

  <div id="toast"></div>

  <!-- データ（demos/ から相対 ../data/） -->
  <script src="../data/thailand.js"></script>
  <script src="../data/korea.js"></script>
  <script src="../data/taiwan.js"></script>
  <script src="../data/usa.js"></script>

  <script>
  (function(){
    "use strict";
    var DATA = window.TABIMAE || {};
    var ORDER = ["thailand","korea","taiwan","usa"];
    var SITE = "たびまえ";

    var SAFETY = {
      1:{label:"比較的安全", cls:"sf1"},
      2:{label:"注意",       cls:"sf2"},
      3:{label:"要注意",     cls:"sf3"},
      4:{label:"危険",       cls:"sf4"}
    };

    var SECTIONS = [
      {id:"basics",   icon:"🧭", title:"基本情報"},
      {id:"safety",   icon:"⚠️", title:"注意点"},
      {id:"phrases",  icon:"💬", title:"会話"},
      {id:"emergency",icon:"🆘", title:"緊急時"},
      {id:"apps",     icon:"📱", title:"アプリ"}
    ];

    // ---- helpers ----
    function esc(s){
      return String(s == null ? "" : s)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
    }
    function el(html){ var t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstElementChild; }
    function badge(sf){
      var s = SAFETY[sf] || SAFETY[2];
      return '<span class="badge '+s.cls+'"><span class="dot"></span>'+esc(s.label)+'</span>';
    }

    var toastTimer;
    function toast(msg){
      var t=document.getElementById("toast");
      t.textContent=msg; t.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer=setTimeout(function(){ t.classList.remove("show"); },1600);
    }
    function copyText(text){
      function done(){ toast("コピーしました"); }
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(done).catch(function(){ legacy(); });
      } else { legacy(); }
      function legacy(){
        try{
          var ta=document.createElement("textarea");
          ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
          document.body.appendChild(ta); ta.focus(); ta.select();
          document.execCommand("copy"); document.body.removeChild(ta); done();
        }catch(e){ toast("コピーできませんでした"); }
      }
    }

    // ---- breadcrumb ----
    function renderCrumb(country){
      var c=document.getElementById("crumb");
      if(!country){
        c.innerHTML='<span class="here">📓 '+esc(SITE)+'</span>';
      }else{
        c.innerHTML=
          '<a href="#">📓 '+esc(SITE)+'</a>'+
          '<span class="sep">/</span>'+
          '<span class="here">'+esc(country.flag)+' '+esc(country.name)+'</span>';
      }
    }

    // ---- HOME ----
    function renderHome(){
      var app=document.getElementById("app");
      var rows = ORDER.map(function(id){
        var c=DATA[id]; if(!c) return "";
        return ''+
          '<div class="country-row" data-go="'+esc(id)+'">'+
            '<div class="country-flag">'+esc(c.flag)+'</div>'+
            '<div class="country-main">'+
              '<div class="country-name">'+esc(c.name)+
                ' <span class="country-en">'+esc(c.nameEn)+'</span>'+
                ' '+badge(c.summary && c.summary.safety)+
              '</div>'+
              '<div class="country-tag">'+esc(c.tagline)+'</div>'+
            '</div>'+
            '<div class="country-arrow">›</div>'+
          '</div>';
      }).join("");

      app.innerHTML=
        '<div class="page-head">'+
          '<div class="page-icon">📓</div>'+
          '<h1 class="page-title">たびまえ</h1>'+
          '<p class="page-sub">旅のまえに、ひととおり。通貨・治安・あいさつ・緊急連絡先まで、出発前に知っておきたいことを国ごとに静かにまとめたノートです。</p>'+
        '</div>'+
        '<div class="section-label">国を選ぶ</div>'+
        '<div class="country-list">'+rows+'</div>'+
        '<div class="footer">治安の目安 — '+
          badge(1)+' 比較的安全 ・ '+badge(2)+' 注意 ・ '+badge(3)+' 要注意 ・ '+badge(4)+' 危険<br>'+
          '情報は出発前の目安です。最新の渡航情報・外務省海外安全情報も必ずご確認ください。</div>';

      Array.prototype.forEach.call(app.querySelectorAll("[data-go]"),function(node){
        node.addEventListener("click",function(){ location.hash="#/"+node.getAttribute("data-go"); });
      });
      renderCrumb(null);
      document.title=SITE+" — 旅のまえに、知っておく";
    }

    // ---- section builders ----
    function buildBasics(c){
      return (c.basics||[]).map(function(b){
        return ''+
          '<div class="basic-item">'+
            '<div class="basic-top">'+
              '<div class="basic-label">'+esc(b.label)+'</div>'+
              '<div class="basic-value">'+esc(b.value)+'</div>'+
            '</div>'+
            (b.note ? '<div class="basic-note">'+esc(b.note)+'</div>' : '')+
          '</div>';
      }).join("");
    }
    function buildSafety(c){
      return (c.safety||[]).map(function(s){
        var lis=(s.items||[]).map(function(it){ return '<li>'+esc(it)+'</li>'; }).join("");
        return ''+
          '<div class="callout">'+
            '<div class="callout-ico">'+esc(s.icon)+'</div>'+
            '<div class="callout-body">'+
              '<div class="callout-cat">'+esc(s.category)+'</div>'+
              '<ul>'+lis+'</ul>'+
            '</div>'+
          '</div>';
      }).join("");
    }
    function buildPhrases(c){
      return (c.phrases||[]).map(function(g){
        var rows=(g.items||[]).map(function(p){
          return ''+
            '<div class="phrase-row" data-copy="'+esc(p.local)+'">'+
              '<div class="phrase-main">'+
                '<div class="phrase-ja">'+esc(p.ja)+'</div>'+
                '<div class="phrase-local">'+esc(p.local)+'</div>'+
                '<div class="phrase-roman">'+esc(p.roman)+'</div>'+
              '</div>'+
              '<div class="phrase-copy">📋 コピー</div>'+
            '</div>';
        }).join("");
        return ''+
          '<div class="phrase-group">'+
            '<h3 class="sub-h">'+esc(g.icon)+' '+esc(g.scene)+'</h3>'+
            '<div class="phrase-rows">'+rows+'</div>'+
          '</div>';
      }).join("");
    }
    function buildEmergency(c){
      var items=(c.emergency||[]).map(function(e){
        var v=String(e.value||"");
        var isTel=/^[+0-9][0-9\-]{2,}$/.test(v.replace(/\s/g,""));
        var right = isTel
          ? '<a class="emerg-tel" href="tel:'+esc(v.replace(/[\s]/g,""))+'">📞 '+esc(v)+'</a>'
          : '<span class="emerg-textval">'+esc(v)+'</span>';
        return ''+
          '<div class="emerg-item">'+
            '<div class="emerg-ico">🆘</div>'+
            '<div class="emerg-body">'+
              '<div class="emerg-label">'+esc(e.label)+'</div>'+
              (e.note ? '<div class="emerg-note">'+esc(e.note)+'</div>' : '')+
              (isTel ? '' : '')+
            '</div>'+
            right+
          '</div>';
      }).join("");
      return '<div class="emerg">'+items+'</div>';
    }
    function buildApps(c){
      return (c.apps||[]).map(function(a){
        return ''+
          '<div class="app-item">'+
            '<div class="app-ico">📱</div>'+
            '<div class="app-body">'+
              '<div class="app-name">'+esc(a.name)+' <span class="app-cat">'+esc(a.category)+'</span></div>'+
              '<div class="app-desc">'+esc(a.desc)+'</div>'+
            '</div>'+
          '</div>';
      }).join("");
    }

    function noteCTA(c){
      var url=(c.noteUrl||"").trim();
      if(url){
        return ''+
          '<div class="note-cta">'+
            '<div class="note-cta-ico">📖</div>'+
            '<div class="note-cta-body">'+
              '<div class="note-cta-title">'+esc(c.name)+'の完全版ノート</div>'+
              '<div class="note-cta-desc">持ち物リスト・モデルルート・もっと詳しい注意点まで。出発前にじっくり読める保存版を用意しました。</div>'+
              '<a class="note-btn" href="'+esc(url)+'" target="_blank" rel="noopener">noteで読む →</a>'+
            '</div>'+
          '</div>';
      }
      return ''+
        '<div class="note-cta">'+
          '<div class="note-cta-ico">📖</div>'+
          '<div class="note-cta-body">'+
            '<div class="note-cta-title">'+esc(c.name)+'の完全版ノート</div>'+
            '<div class="note-cta-desc">持ち物リスト・モデルルートまで載せた保存版を準備中です。公開までもうしばらくお待ちください。</div>'+
            '<span class="note-btn disabled">準備中</span>'+
          '</div>'+
        '</div>';
    }

    // ---- COUNTRY PAGE ----
    function renderCountry(id){
      var c=DATA[id];
      if(!c){ location.hash=""; return; }
      var app=document.getElementById("app");
      var sum=c.summary||{};

      var toc=SECTIONS.map(function(s){
        return '<div class="toc-link" data-jump="sec-'+s.id+'">'+s.icon+' '+esc(s.title)+'</div>';
      }).join("");

      var props=''+
        '<div class="prop-table">'+
          '<div class="prop-row"><div class="prop-key">🛡️ 治安</div><div class="prop-val">'+badge(sum.safety)+'</div></div>'+
          '<div class="prop-row"><div class="prop-key">💴 通貨</div><div class="prop-val">'+esc(sum.currency)+'</div></div>'+
          '<div class="prop-row"><div class="prop-key">🕒 時差</div><div class="prop-val">'+esc(sum.timezone)+'</div></div>'+
          '<div class="prop-row"><div class="prop-key">🗓️ ベスト</div><div class="prop-val">'+esc(sum.season)+'</div></div>'+
        '</div>';

      var bodies={
        basics:buildBasics(c), safety:buildSafety(c), phrases:buildPhrases(c),
        emergency:buildEmergency(c), apps:buildApps(c)
      };
      var secs=SECTIONS.map(function(s){
        return ''+
          '<section class="sec" id="sec-'+s.id+'">'+
            '<h2 class="sec-h">'+s.icon+' '+esc(s.title)+'</h2>'+
            '<hr class="sec-divider">'+
            '<div class="sec-content">'+(bodies[s.id]||'')+'</div>'+
          '</section>';
      }).join("");

      app.innerHTML=
        '<div class="page-head">'+
          '<div class="page-icon">'+esc(c.flag)+'</div>'+
          '<h1 class="page-title">'+esc(c.name)+'</h1>'+
          '<p class="page-sub">'+esc(c.tagline)+'</p>'+
        '</div>'+
        props+
        '<div class="toc">'+
          '<div class="toc-title">目次</div>'+toc+
        '</div>'+
        secs+
        noteCTA(c)+
        '<div class="footer">'+
          '言語：'+esc(c.lang)+' ・ '+esc(c.nameEn)+'<br>'+
          '<a href="#">← '+esc(SITE)+'のトップへ戻る</a></div>';

      // toc jump
      Array.prototype.forEach.call(app.querySelectorAll("[data-jump]"),function(n){
        n.addEventListener("click",function(){
          var t=document.getElementById(n.getAttribute("data-jump"));
          if(t) t.scrollIntoView({behavior:"smooth",block:"start"});
        });
      });
      // phrase copy
      Array.prototype.forEach.call(app.querySelectorAll("[data-copy]"),function(n){
        n.addEventListener("click",function(){ copyText(n.getAttribute("data-copy")); });
      });

      renderCrumb(c);
      document.title=c.name+" — "+SITE;
      window.scrollTo(0,0);
    }

    // ---- router ----
    function route(){
      var h=location.hash.replace(/^#\/?/,"").trim();
      if(h && DATA[h]){ renderCountry(h); }
      else { renderHome(); }
    }
    window.addEventListener("hashchange",route);
    route();
  })();
  </script>
